<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<meta name="description" content="QiCYCLE - 奇怪的气压知识增加了！Guess PSI quiz game">
<title>QiCYCLE 气压猜猜乐</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Poppins:wght@600;700;800;900&amp;display=swap" rel="stylesheet">

<style>
:root {
  --p: #ff4c03;
  --pl: #ff6b35;
  --s: #108474;
  --d: #1a1a2e;
  --bg: #f8f9fa;
  --w: #fff;
  --g2: #e0e0e8;
  --g6: #666680;
  --t: #2d2d44;
  --e: #8b5cf6;
  --gr: linear-gradient(135deg, #ff4c03, #ff6b35);
  --ge: linear-gradient(135deg, #8b5cf6, #a78bfa);
  --game-radius: 20px;
  --game-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --shadow-card: 0 8px 32px rgba(255, 76, 3, 0.12);
  --shadow-easter: 0 8px 32px rgba(139, 92, 246, 0.15);
  --tr: 0.3s ease;
  --sh: rgba(0,0,0,0.06);
  --hero-bg: radial-gradient(ellipse at 50% 30%, rgba(255,76,3,0.08) 0, rgba(139,92,246,0.04) 40%, transparent 70%);
  --tag-bg: rgba(255,255,255,0.7);
  --tag-border: rgba(0,0,0,0.06);
  --float-op: 0.15;
}
[data-theme="dark"] {
  --d: #e8e8f0;
  --bg: #0d0d1a;
  --w: #1a1a2e;
  --g2: #2d2d44;
  --g6: #9999aa;
  --t: #c0c0cc;
  --shadow-card: 0 8px 32px rgba(255, 76, 3, 0.25);
  --shadow-easter: 0 8px 32px rgba(139, 92, 246, 0.3);
  --sh: rgba(0,0,0,0.15);
  --hero-bg: radial-gradient(ellipse at 50% 30%, rgba(255,76,3,0.12) 0, rgba(139,92,246,0.06) 40%, transparent 70%);
  --tag-bg: rgba(26,26,46,0.8);
  --tag-border: rgba(255,255,255,0.08);
  --float-op: 0.08;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;color:var(--t);background:var(--bg);line-height:1.6;overflow-x:hidden}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:var(--w);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px var(--sh);gap:12px}
.hdr-l{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.hdr-logo{height:28px;width:auto;display:block}
.hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hdr-lang{padding:5px 8px;border:2px solid var(--g2);border-radius:8px;font-size:12px;font-family:Inter,sans-serif;background:var(--w);color:var(--t);cursor:pointer;max-width:70px}
.hdr-ach{padding:5px 6px;border:none;border-radius:8px;font-size:15px;background:transparent;cursor:pointer;line-height:1}
.hdr-theme{padding:5px 8px;border:2px solid var(--g2);border-radius:8px;font-size:14px;background:var(--w);cursor:pointer;line-height:1}
.hdr-s{color:var(--p);text-decoration:none;font-weight:600;font-size:13px;padding:6px 16px;border:2px solid var(--p);border-radius:999px;transition:var(--tr);white-space:nowrap}
.hdr-s:hover{background:var(--p);color:#fff}
@media(max-width:540px){
  .hdr{padding:8px 12px;gap:8px}
  .hdr-logo{height:22px}
  .hdr-lang{font-size:11px;padding:4px 5px;max-width:54px}
  .hdr-ach{font-size:14px;padding:4px 4px}
  .hdr-theme{font-size:13px;padding:4px 6px}
  .hdr-s{font-size:11px;padding:5px 12px}
}
@media(max-width:400px){
  .hdr-s{display:none}
  .hdr-lang{font-size:10px;max-width:46px}
}
.con{max-width:1000px;margin:0 auto;padding:0 20px}
/* ===== HERO IMMERSIVE ===== */
.hero{position:relative;min-height:70vh;display:flex;align-items:center;justify-content:center;overflow:hidden;text-align:center;padding:60px 20px 40px;transition:min-height 0.5s ease}
.hero.compact{min-height:80px;padding:12px 20px}
.hero.compact .hero-line{font-size:clamp(16px,3vw,24px)}
.hero.compact .hero-title-wrap{padding:4px}
.hero.compact .hero-btn,.hero.compact .hero-typewriter,.hero.compact .hero-tags,.hero.compact .hero-particles,.hero.compact .hero-floats,.hero.compact .hero-bg{display:none!important}
.hero-bg{position:absolute;inset:0;background:var(--hero-bg);pointer-events:none}
/* Particles - explosion effect */
.hero-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.hero-particle{position:absolute;top:73%;left:50%;border-radius:50%;opacity:0;animation:particleBurst var(--dur,2.5s) ease-out infinite}
.hero-particle.is-spark{width:3px!important;height:3px!important;border-radius:0!important;animation:sparkBurst var(--dur,1.5s) ease-out infinite}
.hero-particle.is-ring{width:var(--rs,40px)!important;height:var(--rs,40px)!important;border:2px solid;background:transparent!important;border-radius:50%!important;animation:ringBurst var(--dur,2s) ease-out infinite}
@keyframes particleBurst{
  0%{transform:translate(0,0) scale(0);opacity:1}
  20%{opacity:0.9;transform:translate(calc(var(--px)*0.3),calc(var(--py)*0.3)) scale(1.5)}
  100%{transform:translate(var(--px),var(--py)) scale(0.3);opacity:0}
}
@keyframes sparkBurst{
  0%{transform:translate(0,0) rotate(0);opacity:1}
  50%{opacity:0.8;transform:translate(calc(var(--px)*0.5),calc(var(--py)*0.5)) rotate(180deg)}
  100%{transform:translate(var(--px),var(--py)) rotate(360deg);opacity:0}
}
@keyframes ringBurst{
  0%{transform:translate(0,0) scale(0.3);opacity:0.7}
  50%{opacity:0.4;transform:translate(calc(var(--px)*0.4),calc(var(--py)*0.4)) scale(1.2)}
  100%{transform:translate(var(--px),var(--py)) scale(1.8);opacity:0}
}
/* Floating PSI numbers */
.hero-floats{position:absolute;inset:0;pointer-events:none;overflow:hidden;mask-image:linear-gradient(to bottom,black 50%,transparent 80%);-webkit-mask-image:linear-gradient(to bottom,black 50%,transparent 80%)}
.hero-float{position:absolute;font-family:Poppins,sans-serif;font-size:clamp(14px,2vw,22px);font-weight:800;opacity:var(--float-op);color:var(--d);animation:floatUp 12s linear infinite;white-space:nowrap}
.hero-float:nth-child(2n){animation-duration:15s;opacity:calc(var(--float-op)*0.7)}
.hero-float:nth-child(3n){animation-duration:10s;opacity:calc(var(--float-op)*1.3)}
@keyframes floatUp{
  0%{transform:translateY(100vh) rotate(0);opacity:0}
  10%{opacity:var(--fo,0.15)}
  90%{opacity:var(--fo,0.15)}
  100%{transform:translateY(-100px) rotate(10deg);opacity:0}
}
/* Title entrance */
.hero-title-wrap{position:relative;z-index:2;max-width:600px;margin:0 auto;padding:24px;border-radius:24px}
.hero-line{display:block;font-family:Poppins,sans-serif;font-size:clamp(36px,8vw,72px);font-weight:900;line-height:1.1;color:var(--d);overflow:hidden}
.hero-line span{display:inline-block;animation:titleSlide 0.8s cubic-bezier(0.16,1,0.3,1) forwards;opacity:0}
.hero-line:nth-child(1) span{animation-delay:0.2s;color:var(--d)}
.hero-line:nth-child(2) span{animation-delay:0.5s;color:var(--p)}
.hero-line:nth-child(2) span:nth-child(2){color:var(--d)}
@keyframes titleSlide{
  0%{transform:translateY(100%) skewX(-8deg);opacity:0}
  60%{transform:translateY(-5%) skewX(2deg);opacity:1}
  80%{transform:translateY(2%) skewX(-1deg);opacity:1}
  100%{transform:translateY(0) skewX(0);opacity:1}
}
.title-impact{display:inline-block;animation:impactPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.35s both}
@keyframes impactPop{
  0%{transform:scale(0.3);opacity:0}
  60%{transform:scale(1.15)}
  100%{transform:scale(1);opacity:1}
}
/* Typewriter */
.hero-typewriter{font-size:clamp(15px,2vw,19px);color:var(--g6);margin:16px auto 28px;min-height:1.6em;font-weight:500}
.hero-typewriter .cursor{display:inline-block;width:2px;height:1.1em;background:var(--p);margin-left:2px;vertical-align:text-bottom;animation:cursorBlink 0.8s step-end infinite}
@keyframes cursorBlink{50%{opacity:0}}
/* Pulse button */
.hero-btn{display:inline-flex;align-items:center;gap:10px;padding:18px 48px;border:none;border-radius:999px;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);font-family:Inter,sans-serif;background:var(--gr);color:#fff;position:relative;z-index:2;animation:pulseGlow 2.5s ease-in-out 2.5s infinite}
.hero-btn:hover{transform:scale(1.06);box-shadow:0 12px 40px rgba(255,76,3,0.4)}
@keyframes pulseGlow{
  0%,100%{box-shadow:0 0 20px rgba(255,76,3,0.2)}
  50%{box-shadow:0 0 40px rgba(255,76,3,0.45)}
}
/* Knowledge tags */
.hero-tags{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:2}
.hero-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:700;font-family:Poppins,sans-serif;background:var(--tag-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--tag-border);color:var(--g6);animation:tagSlide 0.6s ease-out 2s both}
.hero-tag:nth-child(2){animation-delay:2.2s}
.hero-tag:nth-child(3){animation-delay:2.4s}
@keyframes tagSlide{
  0%{transform:translateY(20px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}
.mode-switch{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.mode-tab{padding:8px 18px;border:2px solid var(--g2);border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;transition:var(--tr);font-family:Inter,sans-serif;background:var(--w);color:var(--t)}
.mode-tab:hover{border-color:var(--p);color:var(--p)}
.mode-tab.on{background:var(--gr);color:#fff;border-color:transparent}
.mode-tab.explore.on{background:var(--ge);border-color:transparent}
.section{display:none}
.section.on{display:block;animation:fi 0.4s}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(200px) rotate(720deg);opacity:0}}
/* Achievements */
.ach-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi 0.3s}
.ach-panel{background:var(--w);border-radius:var(--game-radius);padding:28px 24px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.ach-title{font-family:Poppins,sans-serif;font-size:22px;font-weight:800;color:var(--d);text-align:center;margin-bottom:4px}
.ach-sub{font-size:13px;color:var(--g6);text-align:center;margin-bottom:20px}
.ach-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;background:var(--bg);border:2px solid transparent}
.ach-item.unlocked{border-color:rgba(255,76,3,0.2);background:linear-gradient(135deg,rgba(255,76,3,0.04),rgba(139,92,246,0.06))}
.ach-item.locked{opacity:0.5}
.ach-emoji{font-size:28px;flex-shrink:0}
.ach-info{flex:1}
.ach-name{font-weight:700;font-size:14px;color:var(--d)}
.ach-desc{font-size:12px;color:var(--g6);margin-top:2px}
.ach-rarity{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;flex-shrink:0}
.ach-rarity.common{background:var(--g2);color:var(--g6)}
.ach-rarity.rare{background:rgba(59,130,246,0.12);color:#3b82f6}
.ach-rarity.legendary{background:rgba(255,193,7,0.15);color:#b8860b}
.ach-close{display:block;margin:16px auto 0;padding:10px 32px;border:none;border-radius:999px;background:var(--gr);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif}
.ach-toast{position:fixed;top:80px;right:20px;z-index:400;padding:14px 20px;background:var(--w);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.15);border:2px solid var(--p);display:flex;align-items:center;gap:12px;animation:achSlideIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;max-width:320px}
@keyframes achSlideIn{0%{transform:translateX(120%);opacity:0}100%{transform:translateX(0);opacity:1}}
.ach-toast-icon{font-size:32px}
.ach-toast-text{font-size:13px;font-weight:600;color:var(--t)}
.ach-toast-sub{font-size:12px;color:var(--g6);margin-top:1px}
/* Physics effects */
.effect-container{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.effect-cork{position:absolute;bottom:40%;left:50%;font-size:32px;animation:corkFly 1.2s cubic-bezier(0.22,1,0.36,1) forwards}
@keyframes corkFly{0%{transform:translate(-50%,0) rotate(0)}40%{transform:translate(-120%,-200px) rotate(180deg)}100%{transform:translate(-300%,-400px) rotate(360deg);opacity:0}}
.effect-drip{position:absolute;border-radius:50%;width:8px;height:12px;animation:dripFall 1s ease-in forwards}
@keyframes dripFall{0%{transform:translateY(-20px);opacity:1}100%{transform:translateY(300px);opacity:0}}
.effect-splash{position:absolute;border-radius:50%;width:6px;height:6px;animation:splashBurst 0.8s ease-out forwards}
@keyframes splashBurst{0%{transform:scale(0);opacity:1}50%{transform:scale(3);opacity:0.6}100%{transform:scale(5);opacity:0}}
/* Game section */
.game-area{max-width:500px;margin:0 auto}
.game-progress{display:flex;justify-content:center;align-items:center;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.game-dot{width:12px;height:12px;border-radius:50%;background:var(--g2);transition:var(--tr)}
.lvl-divider{width:2px;height:20px;background:var(--g2);margin:0 4px;border-radius:2px}
.game-dot.on{background:var(--p);transform:scale(1.2)}
.game-dot.correct{background:var(--s)}
.game-dot.wrong{background:#ef4444}
.game-score{display:flex;justify-content:center;gap:24px;margin-bottom:20px;font-size:14px}
.game-score-item{text-align:center}
.game-score-num{font-family:Poppins,sans-serif;font-size:22px;font-weight:800;color:var(--d);display:block}
.game-score-label{color:var(--g6);font-size:12px}
.game-card{background:var(--w);border-radius:var(--game-radius);padding:32px 24px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.game-question{font-size:15px;color:var(--g6);margin-bottom:8px}
.game-item-emoji{font-size:64px;margin-bottom:12px;display:block;animation:float 3s ease-in-out infinite}
.game-item-name{font-family:Poppins,sans-serif;font-size:22px;font-weight:700;color:var(--d);margin-bottom:4px}
.game-item-hint{font-size:13px;color:var(--g6);margin-bottom:24px}
.game-input-group{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:16px}
.game-input{width:120px;padding:14px 16px;border:3px solid var(--g2);border-radius:16px;font-size:24px;font-weight:700;text-align:center;font-family:Poppins,sans-serif;color:var(--d);outline:none;transition:var(--tr);background:var(--w);caret-color:var(--p)}
.game-input:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(255,76,3,0.1)}
.game-input-unit{font-size:18px;font-weight:700;color:var(--g6);font-family:Poppins,sans-serif}
.game-btn{padding:14px 40px;border:none;border-radius:999px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s var(--game-bounce);font-family:Inter,sans-serif}
.game-btn-primary{background:var(--gr);color:#fff}
.game-btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,76,3,0.3)}
.game-btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.game-btn-secondary{background:var(--g2);color:var(--t)}
.game-btn-secondary:hover{background:var(--sh)}
/* Pump mechanic */
.pump-area{position:relative;margin:20px 0}
.pump-bar-wrap{height:40px;background:var(--g2);border-radius:20px;overflow:hidden;position:relative;margin-bottom:8px}
.pump-bar-fill{height:100%;background:var(--gr);border-radius:20px;transition:width 0.05s linear;width:0%}
.pump-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--g6);margin-bottom:12px}
.pump-btn-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.pump-btn{width:180px;height:180px;border-radius:50%;border:6px solid var(--p);background:var(--gr);color:#fff;font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;transition:transform 0.1s;font-family:Poppins,sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.pump-btn:active{transform:scale(0.95)}
.pump-btn.pumping{animation:pumpPulse 0.3s ease-in-out infinite alternate}
@keyframes pumpPulse{from{transform:scale(1);box-shadow:0 0 20px rgba(255,76,3,0.3)}to{transform:scale(1.05);box-shadow:0 0 40px rgba(255,76,3,0.6)}}
.pump-status{font-size:14px;font-weight:600;min-height:1.4em;margin-top:4px}
/* Reveal card */
.reveal-card{background:var(--w);border-radius:var(--game-radius);padding:28px 24px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.reveal-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:999px;font-size:16px;font-weight:700;margin-bottom:16px}
.reveal-badge.perfect{background:rgba(16,132,116,0.1);color:var(--s)}
.reveal-badge.close{background:rgba(255,193,7,0.15);color:#b8860b}
.reveal-badge.wrong{background:rgba(239,68,68,0.1);color:#dc2626}
.gauge-wrap{position:relative;width:200px;height:200px;margin:0 auto 16px}
.gauge-svg{width:100%;height:100%;transform:rotate(-90deg)}
.gauge-bg{fill:none;stroke:var(--g2);stroke-width:10}
.gauge-fill{fill:none;stroke:url(#gg);stroke-width:10;stroke-linecap:round;stroke-dasharray:565;stroke-dashoffset:565;transition:stroke-dashoffset 1.5s ease-out}
.gauge-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge-val{font-family:Poppins,sans-serif;font-size:40px;font-weight:800;color:var(--d);line-height:1}
.gauge-unit{font-size:14px;color:var(--g6);margin-top:2px}
.reveal-range{font-size:13px;color:var(--g6);margin-bottom:16px}
.fun-fact{background:linear-gradient(135deg,rgba(139,92,246,0.06),rgba(139,92,246,0.1));border:1px solid rgba(139,92,246,0.15);border-radius:16px;padding:16px 20px;margin-bottom:20px;text-align:left}
.fun-fact-icon{font-size:20px;margin-right:8px}
.fun-fact-title{font-weight:700;font-size:14px;color:var(--e);margin-bottom:4px}
.fun-fact-text{font-size:14px;color:var(--g6);line-height:1.5}
.conv{font-size:13px;color:var(--p);font-weight:600;margin-top:8px;padding-top:8px;border-top:1px solid rgba(139,92,246,0.12)}
/* Summary */
.summary-card{background:var(--w);border-radius:var(--game-radius);padding:36px 24px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.summary-emoji{font-size:64px;margin-bottom:16px;display:block;animation:pop 0.6s var(--game-bounce)}
.summary-title{font-family:Poppins,sans-serif;font-size:26px;font-weight:800;color:var(--d);margin-bottom:8px}
.summary-sub{font-size:15px;color:var(--g6);margin-bottom:24px}
.summary-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.summary-stat{padding:16px;background:var(--bg);border-radius:14px}
.summary-stat-num{font-family:Poppins,sans-serif;font-size:28px;font-weight:800;color:var(--p);display:block}
.summary-stat-label{font-size:12px;color:var(--g6)}
.summary-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
/* Explore section */
.explore-area{max-width:800px;margin:0 auto}
.explore-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.explore-cat{margin-bottom:28px}

.explore-item:hover{transform:translateY(-3px);border-color:var(--p);box-shadow:var(--shadow-card)}

.explore-item-emoji{font-size:36px;margin-bottom:8px;display:block}

.explore-item-psi{font-size:11px;color:var(--g6);margin-top:4px}
.explore-detail{background:var(--w);border-radius:var(--game-radius);padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,0.06);display:none;margin-bottom:20px}
.explore-detail.on{display:block;animation:fi 0.4s}
.explore-detail-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.explore-detail-emoji{font-size:48px}
.explore-detail-name{font-family:Poppins,sans-serif;font-size:20px;font-weight:700;color:var(--d)}
.explore-detail-psi{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.explore-psi-item{padding:10px 18px;background:rgba(255,76,3,0.06);border-radius:12px;text-align:center}
.explore-psi-label{font-size:11px;color:var(--g6);margin-bottom:2px}
.explore-psi-value{font-family:Poppins,sans-serif;font-size:20px;font-weight:800;color:var(--p)}
.explore-detail-close{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border:none;border-radius:999px;background:var(--bg);color:var(--g6);font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr)}
.explore-detail-close:hover{background:var(--g2);color:var(--t)}

.products{display:none;margin-top:20px}
.products.on{display:block;animation:fi 0.5s}
.products-title{font-family:Poppins,sans-serif;font-size:16px;font-weight:700;color:var(--d);text-align:center;margin-bottom:4px}
.products-sub{font-size:13px;color:var(--g6);text-align:center;margin-bottom:16px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;max-width:600px;margin:0 auto}
.product-card{background:var(--w);border:2px solid var(--g2);border-radius:16px;padding:16px;text-align:center;transition:var(--tr);position:relative}
.product-card.best{border-color:var(--p);box-shadow:var(--shadow-card)}
.product-card:hover{transform:translateY(-3px)}
.product-card-badge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:3px 12px;border-radius:999px;font-size:10px;font-weight:700}
.product-card-img{width:100px;height:100px;object-fit:contain;margin:4px auto 10px;display:block;background:rgba(255,255,255,0.06);border-radius:12px;padding:4px}
.product-card-name{font-weight:700;font-size:14px;color:var(--d);margin-bottom:2px}
.product-card-price{font-weight:700;font-size:16px;color:var(--p);margin-bottom:4px}
.product-card-desc{font-size:12px;color:var(--g6);margin-bottom:12px}
.product-card-link{display:inline-block;padding:8px 20px;background:var(--d);color:#fff;text-decoration:none;border-radius:999px;font-size:12px;font-weight:600;transition:var(--tr)}
.product-card-link:hover{background:var(--p)}
/* Confetti */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;top:-10px;animation:confetti-fall 2s ease-out forwards}
.confetti-piece:nth-child(1){left:10%;background:var(--p);animation-delay:0s;animation-duration:2.5s}
.confetti-piece:nth-child(2){left:20%;background:var(--e);animation-delay:0.1s;animation-duration:2s}
.confetti-piece:nth-child(3){left:30%;background:#fbbf24;animation-delay:0.2s;animation-duration:3s}
.confetti-piece:nth-child(4){left:40%;background:var(--s);animation-delay:0.3s;animation-duration:2.2s}
.confetti-piece:nth-child(5){left:50%;background:var(--pl);animation-delay:0.15s;animation-duration:2.8s}
.confetti-piece:nth-child(6){left:60%;background:var(--e);animation-delay:0.25s;animation-duration:2.4s}
.confetti-piece:nth-child(7){left:70%;background:#fbbf24;animation-delay:0.05s;animation-duration:2.6s}
.confetti-piece:nth-child(8){left:80%;background:var(--s);animation-delay:0.35s;animation-duration:2.1s}
.confetti-piece:nth-child(9){left:90%;background:var(--p);animation-delay:0.2s;animation-duration:2.9s}
.confetti-piece:nth-child(10){left:15%;background:#a78bfa;animation-delay:0.4s;animation-duration:2.3s}
/* Streak fire */
.streak-fire{display:inline-flex;align-items:center;gap:4px;font-size:20px;animation:float 2s ease-in-out infinite}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 28px;background:var(--d);color:#fff;border-radius:999px;font-size:14px;font-weight:600;opacity:0;transition:all 0.4s var(--game-bounce);z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Footer */
.ft{background:var(--d);color:#fff;padding:36px 24px;text-align:center;margin-top:48px}
.ft-logo{height:24px;width:auto;opacity:0.9}
.ft-t{color:#c0c0cc;font-size:13px}
.ft-lk{margin-top:14px}
.ft-lk a{color:#c0c0cc;text-decoration:none;font-size:13px;margin:0 10px;transition:var(--tr)}
.ft-lk a:hover{color:var(--p)}
.ft-d{margin-top:12px;font-size:11px;color:#666680}
/* Responsive */
@media(max-width:640px){
  .hero{min-height:60vh;padding:40px 16px 60px}
  .hero-line{font-size:clamp(28px,10vw,48px)}
  .hero-tags{gap:6px}
  .hero-tag{font-size:10px;padding:4px 10px}
  .hero-btn{padding:14px 36px;font-size:16px}
  .game-input{width:100px;font-size:20px}
  .game-card{padding:24px 16px}
  .summary-stats{grid-template-columns:repeat(3,1fr);gap:8px}
  .explore-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .products-grid{grid-template-columns:1fr}
  .explore-detail{padding:20px 16px}
}
@media(max-width:480px){

}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
  .hero-item-emoji,.streak-fire{animation:none!important}
}
.h{display:none!important}

<script>
function $(id){return document.getElementById(id)}
var lang="zh"
/* ===== DATA ===== */
var VT={car:{l:"Car",ss:{sedan:{l:"Sedan/Compact",v:32,em:"🚗"},suv:{l:"SUV/Crossover",v:35,em:"🚙"},truck:{l:"Truck/Van",v:38,em:"🛻"},sports:{l:"Sports Car",v:36,em:"🏎️"},winter:{l:"Winter Setup",v:35,em:"❄️"},bus:{l:"Bus",v:105,em:"🚌"},mining_truck:{l:"Mining Truck",v:55,em:"🚛"}}},bike:{l:"Bicycle",ss:{road:{l:"Road Bike",v:100,em:"🚴"},mountain:{l:"Mountain Bike",v:30,em:"⛰️"},hybrid:{l:"Hybrid/Commuter",v:60,em:"🚲"},touring:{l:"Touring Bike",v:85,em:"🎒"},bmx:{l:"BMX",v:50,em:"🤸"},fat:{l:"Fat Bike",v:15,em:"🏖️"},ebike:{l:"E-Bike",v:50,em:"⚡"}}},kids:{l:"Kids Bike",ss:{i12:{l:"Kids 12-inch",v:25,em:"👶"},i16:{l:"Kids 16-inch",v:30,em:"🧒"},i20:{l:"Kids 20-inch",v:35,em:"🧑"}}},sports:{l:"Sports Ball",ss:{bball:{l:"Basketball",v:8,em:"🏀"},soccer:{l:"Soccer",v:12,em:"⚽"},vball:{l:"Volleyball",v:4.5,em:"🏐"},football:{l:"American Football",v:13,em:"🏈"},rugby:{l:"Rugby",v:9.5,em:"🏉"},tennis:{l:"Tennis",v:13,em:"🎾"},netball:{l:"Netball",v:9,em:"🏀"}}}}

/* Easter egg items */
var EASTER=[{id:"f1",l:"F1 Race Car Tire",v:22,r:[20,23],em:"🏎️💨",fact:"F1赛车才700kg，胎压只需 21-23 PSI！你2吨的车反而要35。轻量化才是王道！"},{id:"plane",l:"Boeing 737 Tire",v:195,r:[190,200],em:"✈️",fact:"波音737落地冲击力几百吨，胎压高达 195 PSI！≈ 汽车轮胎的 5 倍。"},{id:"champagne",l:"Champagne Bottle Opener",v:90,r:[85,95],em:"🍾",fact:"用气泵开香槟！90 PSI 气压顶开木塞，比手拧安全又炫酷。开瓶瞬间软木塞能飞 55 km/h！"},{id:"espresso",l:"Espresso Extraction",v:130,r:[125,140],em:"☕",fact:"意式咖啡要 9 bar ≈ 130 PSI 萃取！气泵接便携咖啡机，野外也能喝浓缩。气泵做咖啡，最反直觉。"},{id:"camping",l:"Camping Shower",v:15,r:[10,20],em:"🚿",fact:"气泵 + 水箱 + 花洒头 = 露营高压淋浴！15 PSI 就能舒舒服服洗个澡。比拎水桶冲爽 10 倍。"},{id:"foam",l:"Car Foam Sprayer",v:50,r:[40,60],em:"🧼",fact:"气泵接泡沫壶洗车，50 PSI 打出浓密泡沫。比手动喷壶细腻 10 倍，一泵搞定。"},{id:"scuba",l:"Scuba Diving Tank",v:3000,r:[2800,3200],em:"🤿",fact:"水肺潜水气瓶 3000 PSI！≈ 汽车轮胎的 85 倍。这么高是要在水下呼吸 45 分钟。每次潜完都得去气站充。"},{id:"sup",l:"Inflatable SUP",v:15,r:[12,18],em:"🏄",fact:"桨板只要 15 PSI！看着大，其实低压高容积。气泵接上 2 分钟打满，站上去稳稳当当。"},{id:"space",l:"Space Suit",v:4.3,r:[3.7,4.8],em:"👨‍🚀",fact:"宇航服里是纯氧，只加压到 4.3 PSI！地球大气是 14.7 PSI。低压纯氧就能呼吸，高了反而氧中毒。"},{id:"paintball",l:"Paintball CO2 Tank",v:850,r:[800,900],em:"🎨",fact:"彩弹枪 CO2 气瓶 850 PSI！高压缩 CO2 每次射击膨胀 500 倍体积，把彩弹推出 90 m/s。"}]
/* Product data */
var PRODS=[{id:"a1",n:"Mini A1",p:"$33.99",img:"https://cdn.shopify.com/s/files/1/0724/8140/7293/files/1680-A1_400x.jpg?v=1709997371",url:"https://www.qicycle.com/products/qicycle-a1-automobile-electric-car-tyre-inflator",sc:{car:60,bike:70,kids:80,sports:90},d:"Best value for basic needs"},{id:"mini",n:"Mini",p:"$65.99",img:"https://cdn.shopify.com/s/files/1/0724/8140/7293/files/1680-mini_400x.jpg?v=1709997596",url:"https://www.qicycle.com/products/qicycle-mini-portable-electric-bike-pump",sc:{car:65,bike:85,kids:75,sports:80},d:"Ultra-portable for cyclists"},{id:"n3",n:"N3",p:"$55.99",img:"https://cdn.shopify.com/s/files/1/0724/8140/7293/files/1680-N3_400x.jpg?v=1709997483",url:"https://www.qicycle.com/products/qicycle-n3-portable-electric-tyre-inflator",sc:{car:85,bike:95,kids:75,sports:60},d:"150 PSI max, perfect for road bikes"},{id:"nano",n:"Nano",p:"$76.99",img:"https://cdn.shopify.com/s/files/1/0724/8140/7293/files/nano-me03_400x.png?v=1747283812",url:"https://www.qicycle.com/products/qicycle-nano-bike-pump",sc:{car:70,bike:90,kids:85,sports:75},d:"Dual power, pocket-sized"},{id:"p1",n:"P1",p:"$89.99",img:"https://cdn.shopify.com/s/files/1/0724/8140/7293/files/1680-P1_400x.jpg?v=1709997508",url:"https://www.qicycle.com/products/qicycle-p1-portable-electric-car-tyre-inflator",sc:{car:95,bike:90,kids:80,sports:85},d:"Best all-rounder"},{id:"3pro",n:"3Pro",p:"$99.99",img:"https://cdn.shopify.com/s/files/1/0724/8140/7293/files/3pro-me_3a1ae5b5-0bba-474e-b9cd-476d0acc4fec_400x.png?v=1747283943",url:"https://www.qicycle.com/products/qicycle-portable-electric-tyre-inflator-3pro",sc:{car:98,bike:98,kids:90,sports:95},d:"Professional grade"}]
/* ===== GAME STATE ===== */
/* ===== LEVEL SYSTEM ===== */
var LEVELS=[
  {id:"rookie",name:"Rookie",cn:"打气新手",emoji:"🌱",rounds:3,req:2,diff:"easy"},
  {id:"apprentice",name:"Apprentice",cn:"气压学徒",emoji:"🔧",rounds:2,req:2,diff:"medium",offset:3},
  {id:"hunter",name:"Fact Hunter",cn:"冷知识猎手",emoji:"🧠",rounds:2,req:1,diff:"hard",offset:5},
  {id:"master",name:"Pressure Master",cn:"气压大师",emoji:"🏆",rounds:3,req:2,diff:"expert",offset:7}
]
/* Level question pools */
var LEVEL_POOLS={
  rookie:[
    {cat:'sports',sub:'bball'},{cat:'sports',sub:'soccer'},{cat:'kids',sub:'i12'},{cat:'sports',sub:'vball'}
  ],
  apprentice:[
    {cat:'car',sub:'sedan'},{cat:'car',sub:'suv'},{cat:'bike',sub:'hybrid'},{cat:'kids',sub:'i20'}
  ],
  hunter:[
    {type:'easter',id:'champagne'},{type:'easter',id:'camping'},{cat:'bike',sub:'road'},{cat:'sports',sub:'football'},{type:'easter',id:'sup'},{type:'easter',id:'paintball'},{cat:'car',sub:'bus'}
  ],
  master:[
    {type:'easter',id:'f1'},{type:'easter',id:'espresso'},{type:'easter',id:'foam'},{cat:'car',sub:'truck'},{type:'easter',id:'plane'},{type:'easter',id:'scuba'},{type:'easter',id:'space'},{cat:'car',sub:'mining_truck'}
  ]
}
function resolvePoolItem(it){
  if(it.type=='easter'){
    var e=EASTER.find(function(x){return x.id==it.id})
    return e?{cat:'easter',sub:it.id,type:'easter',emoji:e.em,easter:e}:null
  }
  var cat=VT[it.cat],sub=cat&&cat.ss[it.sub]
  if(!sub)return null
  return{cat:it.cat,sub:it.sub,type:'normal',emoji:sub.em||'❓'}
}
function shuffleArr(a){
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}
  return a
}
var game={mode:"",score:0,streak:0,bestStreak:0,round:0,totalRounds:10,items:[],answers:[],active:false,levelIdx:0,badges:[]}
var quizItems=[]
/* ===== FUNCTIONS ===== */
function startGame(){
  game={mode:"game",score:0,streak:0,bestStreak:0,round:0,totalRounds:10,items:[],answers:[],active:true,levelIdx:0,badges:[]}
  ACH_STATE.games++
  saveAchievements()
  gtag('event','game_start',{game_count:ACH_STATE.games})
  quizItems=generateQuiz()
  showMode('game')
  renderGame()
}
function showMode(m){
  game.mode=m
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('on')})
  $('heroSection').className='hero'+(m=='game'||m=='explore'?' compact':'')
  if(m=='game')$('secGame').classList.add('on')
  else if(m=='explore')$('secExplore').classList.add('on')

  $('tabHome').className='mode-tab'
  $('tabGame').className='mode-tab'+(m=='game'?' on':'')
  $('tabExplore').className='mode-tab explore'+(m=='explore'?' on':'')
  $('modeSwitch').style.display='flex'
}
function switchMode(m){
  if(m=='game')startGame()
  else if(m=='explore')showExplore()
  else goHome()
}
function goHome(){
  game={mode:"home",active:false}
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('on')})
  $('heroSection').className='hero'
  document.querySelectorAll('.mode-tab').forEach(function(t){t.classList.remove('on')})
  $('modeSwitch').style.display='flex'
}
function generateQuiz(){
  var picked=[]
  for(var l=0;l<LEVELS.length;l++){
    var pool=shuffleArr(LEVEL_POOLS[LEVELS[l].id].slice())
    var need=LEVELS[l].rounds
    for(var i=0;i<pool.length&&picked.length<10&&need>0;i++){
      var item=resolvePoolItem(pool[i])
      if(item){picked.push(item);need--}
    }
    // fallback if pool runs out
    if(need>0){
      var allItems=[]

var pumpTimer=null,pumpVal=0,pumpSpeed=0,pumpActive=false,pumpMaxVal=100

  try{

  }catch(e){}
}

function animateGauge(v,ideal){
  // Low PSI (<35): ideal lands at 30-50% of gauge
  // High PSI (>=35): ideal lands at 66-85% of gauge
  var pos=ideal<35?0.30+(ideal%21)*0.01:0.66+(ideal%20)*0.01
  var mx=ideal/pos
  var pct=Math.min(v/mx,1)
  var offset=565-(565*pct)
  var dur=Math.max(800,Math.min(3000,v*20))
  $('gVal').textContent='0'
  setTimeout(function(){
    $('gFill').style.strokeDashoffset=offset
    var start=null
    function step(ts){
      if(!start)start=ts
      var t=Math.min((ts-start)/dur,1)
      var e=1-Math.pow(1-t,3)
      $('gVal').textContent=Math.round(v*e)
      if(t<1)requestAnimationFrame(step)
    }
    requestAnimationFrame(step)
  },100)
}

var audioCtx=null
function playNote(freq,dur,type,vol){
  try{
    if(!audioCtx)audioCtx=new AudioContext()
    if(audioCtx.state=='suspended')audioCtx.resume()
    var o=audioCtx.createOscillator(),g=audioCtx.createGain()
    o.type=type||'sine'
    o.frequency.setValueAtTime(freq,audioCtx.currentTime)
    g.gain.setValueAtTime(vol||0.08,audioCtx.currentTime)
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur)
    o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)
  }catch(e){}
}
function playSound(type,streak){
  var s=streak||0
  if(type=='correct'){playNote(660,0.15,'sine',0.08)}
  else if(type=='perfect'){

/* ===== HERO ANIMATIONS ===== */
function initHeroParticles(){
  var c=$('heroParticles')
  if(!c)return
  c.innerHTML=''
  var cols=['#ff4c03','#ff6b35','#ff8c5a','#8b5cf6','#a78bfa','#fff']
  // Dots - burst downward and outward from button area
  for(var i=0;i<40;i++){
    var p=document.createElement('div')
    p.className='hero-particle'
    var angle=-80+Math.random()*160  // -80 to 80 degrees (mostly downward)
    var dist=80+Math.random()*250
    var dpx=Math.cos(angle*Math.PI/180)*dist
    var dpy=Math.abs(Math.sin(angle*Math.PI/180)*dist)  // always positive = downward
    p.style.setProperty('--px',dpx+'px')
    p.style.setProperty('--py',dpy+'px')
    p.style.setProperty('--dur',(2+Math.random()*2)+'s')
    p.style.animationDelay=(Math.random()*0.6)+'s'
    p.style.width=p.style.height=(3+Math.random()*8)+'px'
    p.style.background=cols[i%cols.length]
    p.style.boxShadow='0 0 '+(2+Math.random()*6)+'px '+cols[i%cols.length]
    c.appendChild(p)
  }
  // Sparks - fast thin lines, also downward
  for(var i=0;i<20;i++){
    var p=document.createElement('div')
    p.className='hero-particle is-spark'
    var angle=-70+Math.random()*140,dist=120+Math.random()*280
    var dpx=Math.cos(angle*Math.PI/180)*dist
    var dpy=Math.abs(Math.sin(angle*Math.PI/180)*dist)
    p.style.setProperty('--px',dpx+'px')
    p.style.setProperty('--py',dpy+'px')
    p.style.setProperty('--dur',(1+Math.random()*1.5)+'s')
    p.style.animationDelay=(Math.random()*1)+'s'
    p.style.background='#ffcc00'
    p.style.boxShadow='0 0 4px #ffcc00'
    c.appendChild(p)
  }
  // Rings - expanding circles, also mostly downward
  for(var i=0;i<8;i++){
    var p=document.createElement('div')
    p.className='hero-particle is-ring'
    p.style.setProperty('--rs',(30+Math.random()*40)+'px')
    var angle=-60+Math.random()*120,dist=60+Math.random()*150
    var dpx=Math.cos(angle*Math.PI/180)*dist
    var dpy=Math.abs(Math.sin(angle*Math.PI/180)*dist)
    p.style.setProperty('--px',dpx+'px')
    p.style.setProperty('--py',dpy+'px')
    p.style.setProperty('--dur',(2+Math.random()*2)+'s')
    p.style.animationDelay=(Math.random()*1.5)+'s'
    p.style.borderColor=cols[i%cols.length]
    c.appendChild(p)
  }
}

/* Typewriter */
var twTimer=null
function initTypewriter(){
  if(twTimer){clearTimeout(twTimer);twTimer=null}
  $("typewriterText").textContent=""
  var texts=(LS&&LS.typewriter)||L.en.typewriter
  var el=$("typewriterText"),idx=0,charIdx=0,dir=1
  function type(){
    if(!el)return
    var t=texts[idx]
    if(dir==1){
      el.textContent=t.substring(0,charIdx+1)
      charIdx++
      if(charIdx>=t.length){dir=-1;twTimer=setTimeout(type,2000);return}
    }else{
      el.textContent=t.substring(0,charIdx-1)
      charIdx--
      if(charIdx<=0){dir=1;idx=(idx+1)%texts.length;twTimer=setTimeout(type,800);return}
    }
    twTimer=setTimeout(type,dir==1?40+Math.random()*60:20)
  }
  twTimer=setTimeout(type,1500)
}

var ACH_STATE={games:0,quick:0,bestStreak:0,overfill:0,explored:0,beatMaster:0,unlocked:[]}
function loadAchievements(){
  try{
    var s=localStorage.getItem("qicycleAch")
    if(s){var p=JSON.parse(s);for(var k in p)ACH_STATE[k]=p[k]}
  }catch(e){}
}
function saveAchievements(){
  try{localStorage.setItem("qicycleAch",JSON.stringify(ACH_STATE))}catch(e){}
}
function checkAchievements(){
  var checks={
    first:function(s){return s.games>=1&&s.unlocked.indexOf("first")<0},
    knowledge:function(s){return s.games>=5&&s.unlocked.indexOf("knowledge")<0},
    lightning:function(s){return s.quick>=1&&s.unlocked.indexOf("lightning")<0},
    bullseye:function(s){return s.bestStreak>=5&&s.unlocked.indexOf("bullseye")<0},
    exploder:function(s){return s.overfill>=3&&s.unlocked.indexOf("exploder")<0},
    museum:function(s){return s.explored>=6&&s.unlocked.indexOf("museum")<0},
    master:function(s){return s.beatMaster>=1&&s.unlocked.indexOf("master")<0},
    ten:function(s){return s.games>=10&&s.unlocked.indexOf("ten")<0}
  }
  for(var id in checks){
    if(checks[id](ACH_STATE)&&ACH_STATE.unlocked.indexOf(id)<0){
      ACH_STATE.unlocked.push(id)
      saveAchievements()
      showAchievementToast(id)
    }
  }
}
function showAchievementToast(id){
  var a=ACH_LIST.find(function(x){return x.id==id})
  if(!a)return
  var t=document.createElement('div')
  t.className='ach-toast'
  var icon=a.emoji
  t.innerHTML='<span class="ach-toast-icon">'+icon+'</span><div><div class="ach-toast-text">'+(LS.achUnlock||'Achievement Unlocked!')+'</div><div class="ach-toast-sub">'+a.name+'</div></div>'
  document.body.appendChild(t)
  gtag('event','achievement_unlock',{achievement_id:id,achievement_name:a.name,rarity:a.rarity})
  playSound('badge')
  setTimeout(function(){t.style.transition='transform 0.4s ease,opacity 0.4s ease';t.style.transform='translateX(120%)';t.style.opacity='0';setTimeout(function(){t.remove()},500)},3000)
}
function showAchievements(){
  var h='<div class="ach-overlay" onclick="if(event.target===this)closeAchievements()"><div class="ach-panel"><div class="ach-title">'+(LS.achTitle||'Achievements')+'</div><div class="ach-sub">'+ACH_STATE.unlocked.length+'/'+ACH_LIST.length+' '+(LS.achUnlocked||'unlocked')+'</div><div class="ach-list">'
  ACH_LIST.forEach(function(a){
    var unlocked=ACH_STATE.unlocked.indexOf(a.id)>=0
    var rarityLabel={common:'Common',rare:'Rare',legendary:'Legendary'}
    h+='<div class="ach-item'+(unlocked?' unlocked':' locked')+'"><span class="ach-emoji">'+(unlocked?a.emoji:'🔒')+'</span><div class="ach-info"><div class="ach-name">'+(unlocked?a.name:'???')+'</div><div class="ach-desc">'+(unlocked?a.desc:'Keep playing to discover')+'</div></div><span class="ach-rarity '+a.rarity+'">'+(unlocked?rarityLabel[a.rarity]:'')+'</span></div>'
  })
  h+='</div><button class="ach-close" onclick="closeAchievements()">'+(LS.closeLabel||'Close')+'</button></div></div>'
  var div=document.createElement('div')
  div.innerHTML=h
  document.body.appendChild(div.firstElementChild)
}
function closeAchievements(){
  var o=document.querySelector('.ach-overlay')
  if(o)o.remove()
}
